<!doctype html>
<html lang="ru">
<head>
{{headCommon}}
<title>Журнал // onlyyaml</title>
<meta name="description" content="Записи о том, как держать homelab на ходу: kubernetes, gitops, storage, сети, наблюдаемость.">
<link rel="canonical" href="https://onlyyaml.dev/blog/">
<meta property="og:type" content="website">
<meta property="og:title" content="Журнал // onlyyaml">
<meta property="og:description" content="Записи о homelab: kubernetes, gitops, storage, сети, наблюдаемость.">
<meta property="og:url" content="https://onlyyaml.dev/blog/">
<meta property="og:image" content="https://onlyyaml.dev/open-graph.png">
<meta property="og:locale" content="ru_RU">
</head>
<body>

<div class="bg tint"></div>
<div class="bg scan"></div>
<div class="bg noise"></div>
<div class="bg vignette"></div>

{{nav}}

<div class="corner tl">archive · <b>talos / cilium / cnpg</b></div>
<div class="corner br">
  <span>rev · <b>#2k26</b></span>
  <span>entries · <b>{{postCount}}</b></span>
</div>

<header class="page-head">
  <div>
    <div class="eyebrow">homelab // journal</div>
    <h1>
      ARCHIVE.
      <i>// <span style="color:var(--accent-2);">LOG ENTRIES</span></i>
    </h1>
  </div>
  <pre class="term">{{podsTermHtml}}</pre>
</header>

<div class="chips">
  <span class="lbl">// filter</span>
{{tagsChipsHtml}}
</div>

<main class="archive">
{{featuredRowHtml}}
  <div class="list" id="postList">
    <div class="list-head">
      <span>дата</span>
      <span>категория</span>
      <span>заголовок</span>
      <span style="text-align:right;">длина</span>
      <span></span>
    </div>
{{archiveListHtml}}
  </div>
</main>

{{footer}}

<script src="/script.js"></script>
</body>
</html>
